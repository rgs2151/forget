# The experiment matrix.
#   python -m refuse --config configs/experiments.yml
#   python -m refuse --config configs/experiments.yml --only qwen7b_inhouse
#   python -m refuse --config configs/experiments.yml --list
#
# Resolves as: defaults <- models[model] <- datasets[data] <- per-run override.
# out/name auto-derive as {model}_{data} -> store/{model}_{data}.
# Calibration is model-level: layers / scales / scale_window live on the model.
# calibration_n = samples per concept (stratified), the same for every dataset.
#
# KEEP THIS CONFIG MINIMAL. Only the `runs` list changes between experiments;
# leave defaults / models / datasets as-is unless a knob genuinely needs it.

data_root: store
store_root: store

defaults:
  method: lda
  gpus: [0, 1]
  judge_model: AtlaAI/Selene-1-Mini-Llama-3.1-8B
  judge_gpus: [0, 1]
  judge_mode: reasoning
  judge_retries: 100
  train_frac: 1.0
  test_frac: 1.0
  result: main
  artifact_cache:
  clean_activation_answers: true
  intervention_start: assistant
  plot: true

models:
  llama8b:          { path: meta-llama/Llama-3.1-8B-Instruct,             layers: all, scales: 10, scale_window: mid, batch_size: 8,  judge_batch_size: 16 }
  llama32_1b:       { path: meta-llama/Llama-3.2-1B-Instruct,             layers: all, scales: 10, scale_window: mid, batch_size: 16, judge_batch_size: 16 }
  llama32_3b:       { path: meta-llama/Llama-3.2-3B-Instruct,             layers: all, scales: 10, scale_window: mid, batch_size: 16, judge_batch_size: 16 }
  mistral7b:        { path: mistralai/Mistral-7B-Instruct-v0.3,           layers: all, scales: 10, scale_window: mid, batch_size: 8,  judge_batch_size: 16 }
  mistral_small24b: { path: mistralai/Mistral-Small-24B-Instruct-2501,    layers: all, scales: 10, scale_window: mid, batch_size: 8,  judge_batch_size: 16 }
  qwen05b:          { path: Qwen/Qwen2.5-0.5B-Instruct,                   layers: all, scales: 10, scale_window: large, batch_size: 16, judge_batch_size: 16 }
  qwen3b:           { path: Qwen/Qwen2.5-3B-Instruct,                     layers: all, scales: 10, scale_window: large, batch_size: 16, judge_batch_size: 16 }
  qwen7b:           { path: Qwen/Qwen2.5-7B-Instruct,                     layers: all, scales: 10, scale_window: large, batch_size: 8,  judge_batch_size: 16 }
  qwen14b:          { path: Qwen/Qwen2.5-14B-Instruct,                    layers: all, scales: 10, scale_window: large, batch_size: 8,  judge_batch_size: 16 }
  phi4mini:         { path: microsoft/Phi-4-mini-instruct,                layers: all, scales: 10, scale_window: large, batch_size: 16, judge_batch_size: 16 }
  phi4:             { path: microsoft/phi-4,                              layers: all, scales: 10, scale_window: large, batch_size: 8,  judge_batch_size: 16 }

# calibration_n = samples per concept (stratified); `all` uses every question per concept.
datasets:
  inhouse:        { calibration_n: 10 }   # 10/concept × 10 concepts  = 100 calib samples
  concept10:      { calibration_n: 10 }   # 10/concept × 10 concepts  = 100 calib samples
  concept500:     { calibration_n: 10 }   # 10/concept × 500 concepts = 5000 calib samples
  rwku:           { calibration_n: 10 }   # 10/concept × 200 concepts = 2000 calib samples
  mmlu:           { calibration_n: 10 }   # 10/concept × 10 concepts  = 100 calib samples
  conceptvectors: { calibration_n: 10 }   # 10/concept × 91 concepts  = 910 calib samples

runs:
